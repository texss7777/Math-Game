<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>GameMath - الأشكال الهندسية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* تحسينات الجوال - تكبير الخطوط وتوسيع المسافات */
        html {
            font-size: 16px;
        }
        
        body {
            font-family: 'Segoe UI', 'Tahoma', 'Amiri', Arial, sans-serif;
            overflow: hidden;
            background: #0a0f1e;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* شاشات تسجيل الدخول */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f2e, #0a1a3a);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 30px 25px;
            border-radius: 50px;
            text-align: center;
            color: white;
            border: 2px solid #ffc107;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        
        /* تحسين للجوال - تصغير المسافات */
        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
                border-radius: 40px;
            }
        }
        
        .login-card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .login-card p {
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .login-card input {
            width: 100%;
            padding: 14px 12px;
            margin: 12px 0;
            border-radius: 50px;
            border: none;
            text-align: center;
            font-size: 1rem;
            background: #2c3e50;
            color: white;
        }
        
        .login-card button {
            background: #ff9800;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin: 8px 5px;
            color: #000;
            font-size: 1rem;
            width: auto;
            min-width: 140px;
        }
        
        /* تحسين للجوال - الأزرار تاخذ عرض كامل */
        @media (max-width: 480px) {
            .login-card button {
                width: 100%;
                margin: 8px 0;
            }
        }
        
        .hide { display: none !important; }
        
        /* حاوية العرض ثلاثي الأبعاد */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #071a3b;
        }
        
        /* لوحة التحكم الرئيسية */
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 12px 15px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #ffc107;
            font-size: 12px;
        }
        
        /* تحسين للجوال - لوحة التحكم تصير عامودية */
        @media (max-width: 900px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
                top: 10px;
                left: 10px;
                right: 10px;
                max-height: 85vh;
                overflow-y: auto;
            }
        }
        
        .selector-group {
            background: #1e2a3a;
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .selector-group label {
            color: #ffc107;
            font-weight: bold;
            font-size: 0.85rem;
        }
        
        select, button {
            padding: 8px 15px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #ff9800;
            color: #000;
            font-size: 0.85rem;
        }
        
        select {
            background: #2c3e50;
            color: white;
        }
        
        /* منطقة إدخال المعطيات */
        .inputs-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #000000aa;
            padding: 8px 12px;
            border-radius: 50px;
            justify-content: center;
        }
        
        .inputs-area label {
            color: #2ecc71;
            font-weight: bold;
            font-size: 0.75rem;
        }
        
        .inputs-area input {
            width: 65px;
            padding: 6px;
            border-radius: 30px;
            text-align: center;
            background: #0a0f1e;
            color: #2ecc71;
            border: 1px solid #2ecc71;
            font-size: 0.8rem;
        }
        
        /* منطقة إجابة الطالب */
        .student-answer {
            background: #1e2a3a;
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .student-answer label {
            color: #00bcd4;
            font-weight: bold;
            font-size: 0.85rem;
        }
        
        .student-answer input {
            width: 100px;
            padding: 8px;
            border-radius: 30px;
            text-align: center;
            background: #0a0f1e;
            color: #00bcd4;
            border: 1px solid #00bcd4;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .result-area {
            background: #000000cc;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ffc107;
            text-align: center;
        }
        
        /* شارة اسم الطالب */
        .student-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ff9800, #f39c12);
            color: #000;
            padding: 6px 15px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 100;
            font-size: 0.8rem;
            max-width: 50%;
            white-space: nowrap;
            overflow-x: auto;
        }
        
        /* تحسين للجوال - شارة الطالب */
        @media (max-width: 480px) {
            .student-badge {
                font-size: 0.7rem;
                padding: 4px 10px;
                top: 5px;
                right: 5px;
            }
        }
        
        /* رسالة التغذية الراجعة */
        .feedback {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: #1e2a3a;
            padding: 10px 15px;
            border-radius: 40px;
            z-index: 100;
            border-right: 4px solid gold;
            font-weight: bold;
            color: #ffc107;
            text-align: center;
            font-size: 0.85rem;
        }
        
        /* نتائج المعلم */
        .results-container {
            max-height: 55vh;
            overflow-y: auto;
            padding: 5px;
        }
        
        .student-card {
            background: linear-gradient(135deg, #1e2a3a, #16212e);
            margin: 12px 0;
            padding: 15px;
            border-radius: 20px;
            border-right: 5px solid #ff9800;
        }
        
        .student-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffc107;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            background: rgba(0,0,0,0.4);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        
        /* معلومات المدرسة */
        .school-info {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,193,7,0.3);
            font-size: 0.8rem;
            color: #ffc107;
            text-align: center;
        }
        
        .school-info p {
            margin: 5px 0;
        }
        
        .teacher-name {
            color: #ff9800;
            font-weight: bold;
        }
        
        .school-name {
            color: #2ecc71;
        }
        
        .welcome-message {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            font-size: 1rem;
        }
        
        .error-message {
            color: #ff6b6b;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }
        
        .error-item {
            background: rgba(231, 76, 60, 0.15);
            margin: 8px 0;
            padding: 10px;
            border-radius: 15px;
            border-right: 3px solid #e74c3c;
            font-size: 0.8rem;
        }
        
        .values-compare {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        
        .student-val, .correct-val {
            color: #ffffff;
            font-weight: bold;
        }
        
        details summary {
            cursor: pointer;
            color: #ff9800;
            font-weight: bold;
            padding: 8px;
            border-radius: 20px;
            background: rgba(255,152,0,0.1);
            font-size: 0.85rem;
        }
        
        .no-errors {
            color: #2ecc71;
            background: rgba(46,204,113,0.1);
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 0.8rem;
        }
        
        .result-correct {
            color: #2ecc71 !important;
            font-weight: bold;
        }
        
        .result-wrong {
            color: #e74c3c !important;
            font-weight: bold;
        }
        
        /* تحسينات إضافية للجوال */
        @media (max-width: 600px) {
            .selector-group {
                width: 100%;
                justify-content: space-between;
            }
            
            select {
                flex: 1;
            }
            
            .inputs-area {
                width: 100%;
                justify-content: center;
            }
            
            .student-answer {
                width: 100%;
                justify-content: center;
            }
            
            .result-area {
                width: 100%;
                text-align: center;
            }
            
            .login-card h2 {
                font-size: 1.5rem;
            }
        }
        
        /* تحسين للشاشات الصغيرة جداً */
        @media (max-width: 380px) {
            .inputs-area input {
                width: 55px;
                font-size: 0.7rem;
            }
            
            .student-answer input {
                width: 85px;
            }
            
            .selector-group label {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h2 style="color: #ffc107;">🎮 GameMath</h2>
        <p style="color: white;">أدخل اسمك الثلاثي (بالعربية فقط)</p>
        <input type="text" id="studentNameInput" placeholder="مثال: محمد فهد العنزي" autocomplete="off">
        <div id="nameError" class="error-message">⚠️ الاسم يجب أن يكون ثلاثي باللغة العربية فقط</div>
        <button id="startGameBtn" style="width: 100%;">🎮 ابدأ اللعبة</button>
        
        <div class="school-info">
            <p>👩‍🏫 <span class="teacher-name">المعلمة / ابتسام العطوي</span></p>
            <p>🏫 <span class="school-name">المتوسطة الثالثة والثلاثون</span></p>
        </div>
        
        <hr style="margin: 15px 0; border-color: #ffc107;">
        <button id="teacherLoginBtn" style="background:#4c6a9e; color: white; width: 100%;">👨‍🏫 دخول المعلم</button>
    </div>
</div>

<div id="teacherScreen" class="login-screen hide">
    <div class="login-card">
        <h2>👨‍🏫 لوحة المعلم</h2>
        <p>الرقم السري</p>
        <input type="password" id="teacherPassInput" placeholder="****">
        <button id="teacherSubmitBtn" style="width: 100%;">📊 عرض النتائج</button>
        <button id="backToStudentBtn" style="background: #e74c3c; width: 100%; margin-top: 10px;">🔙 رجوع</button>
    </div>
</div>

<div id="resultsScreen" class="login-screen hide">
    <div class="login-card" style="min-width: unset; width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto;">
        <div id="welcomeMessage" class="welcome-message"></div>
        <h2 style="font-size: 1.3rem;">📊 نتائج الطلاب</h2>
        <div id="resultsList" class="results-container"></div>
        <button id="closeResultsBtn" style="background: #e74c3c; width: 100%; margin-top: 15px;">✖️ إغلاق</button>
    </div>
</div>

<div id="gameContainer" class="hide">
    <div class="student-badge" id="studentBadge"></div>
    <div class="control-panel">
        <div class="selector-group" style="width: 100%;">
            <label>🔷 الشكل:</label>
            <select id="shapeSelect" style="flex: 1;">
                <optgroup label="📦 المجسمات (3D)">
                    <option value="triPrism">منشور ثلاثي</option>
                    <option value="rectPrism">منشور رباعي</option>
                    <option value="cylinder">أسطوانة</option>
                    <option value="triPyramid">هرم ثلاثي</option>
                    <option value="squarePyramid">هرم رباعي</option>
                    <option value="cone">مخروط</option>
                </optgroup>
                <optgroup label="🔷 المسطحات (2D)">
                    <option value="rectangle">مستطيل</option>
                    <option value="square">مربع</option>
                    <option value="triangle">مثلث</option>
                    <option value="trapezoid">شبه منحرف</option>
                </optgroup>
            </select>
        </div>
        <div class="selector-group" style="width: 100%;">
            <label>📐 العملية:</label>
            <select id="lawSelect" style="flex: 1;"></select>
        </div>
        <div class="inputs-area" id="inputsArea" style="width: 100%;"></div>
        <div class="student-answer" style="width: 100%;">
            <label>✏️ إجابتي:</label>
            <input type="number" id="studentAnswer" placeholder="اكتب الناتج" step="any" style="flex: 1;">
            <button id="checkAnswerBtn" style="min-width: 80px;">✅ تحقق</button>
        </div>
        <div class="result-area" id="resultArea" style="width: 100%;">النتيجة: --</div>
    </div>
    <div class="feedback" id="feedbackMsg">✨ اختر شكلاً وأدخل المعطيات</div>
    <div id="canvas-container"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ========== رابط Google Sheets API ==========
    const GOOGLE_SHEETS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxusmlhbTi8yy7EzWl_CvU72D0enu1rYuP-Xwk8FfOPpDjhnQknJYhSsZ1gjNYKQigj/exec";
    
    async function sendToGoogleSheets(studentName, shape, law, studentAnswer, correctAnswer, result) {
        const now = new Date();
        try {
            await fetch(GOOGLE_SHEETS_WEBHOOK_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentName, date: now.toLocaleDateString('ar-SA'), time: now.toLocaleTimeString('ar-SA'),
                    shape, law, studentAnswer, correctAnswer, result
                })
            });
        } catch(e) { console.error(e); }
    }
    
    // ========== تهيئة Three.js ==========
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x071a3b);
    scene.fog = new THREE.FogExp2(0x071a3b, 0.015);
    
    // ضبط الكاميرا حسب حجم الشاشة
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(4, 3, 5);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.rotateSpeed = 0.8;
    controls.zoomSpeed = 0.8;
    controls.target.set(0, 0.5, 0);
    
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(2, 5, 3);
    dirLight.castShadow = true;
    scene.add(dirLight);
    const gridHelper = new THREE.GridHelper(7, 20, 0x88aaff, 0x335588);
    gridHelper.position.y = -0.8;
    scene.add(gridHelper);
    let currentMesh = null;
    
    function createTriangularPrism(b,h,t) {
        const shape = new THREE.Shape();
        shape.moveTo(0,t*0.4);
        shape.lineTo(-b/2,-t*0.6);
        shape.lineTo(b/2,-t*0.6);
        shape.closePath();
        const geo = new THREE.ExtrudeGeometry(shape, { steps:1, depth:h, bevelEnabled:false });
        geo.computeVertexNormals();
        geo.center();
        geo.rotateX(-Math.PI/2);
        geo.rotateZ(Math.PI/2);
        const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color:0xe67e22 }));
        mesh.castShadow = true;
        mesh.position.y = 0;
        return mesh;
    }
    
    function createTriangularPyramid(b,h,t) {
        const mesh = new THREE.Mesh(new THREE.ConeGeometry(b*0.6, h, 3), new THREE.MeshStandardMaterial({ color:0x3498db }));
        mesh.castShadow = true;
        mesh.position.y = -0.3;
        return mesh;
    }
    
    const shapesDB = {
        triPrism: { type:"3d", name:"منشور ثلاثي", allowedLaws:["volume"], params:{ baseEdge:1.2, prismHeight:1.2, triangleHeight:1.0 }, getVolume:(b,h,t)=>0.5*b*t*h, required:()=>['baseEdge','prismHeight','triangleHeight'], create:(p)=>createTriangularPrism(p.baseEdge, p.prismHeight, p.triangleHeight) },
        rectPrism: { type:"3d", name:"منشور رباعي", allowedLaws:["volume"], params:{ length:1.3, width:1.0, height:1.2 }, getVolume:(l,w,h)=>l*w*h, required:()=>['length','width','height'], create:(p)=>new THREE.Mesh(new THREE.BoxGeometry(p.length, p.height, p.width), new THREE.MeshStandardMaterial({ color:0xf1c40f })) },
        cylinder: { type:"3d", name:"أسطوانة", allowedLaws:["volume"], params:{ radius:1.0, height:1.5 }, getVolume:(r,h)=>Math.PI*r*r*h, required:()=>['radius','height'], create:(p)=>new THREE.Mesh(new THREE.CylinderGeometry(p.radius, p.radius, p.height, 48), new THREE.MeshStandardMaterial({ color:0x2ecc71 })) },
        triPyramid: { type:"3d", name:"هرم ثلاثي", allowedLaws:["volume"], params:{ baseEdge:1.2, height:1.4, triangleHeight:1.0 }, getVolume:(b,h,t)=>(1/3)*0.5*b*t*h, required:()=>['baseEdge','height','triangleHeight'], create:(p)=>createTriangularPyramid(p.baseEdge, p.height, p.triangleHeight) },
        squarePyramid: { type:"3d", name:"هرم رباعي", allowedLaws:["volume"], params:{ baseSide:1.3, height:1.5 }, getVolume:(b,h)=>(1/3)*b*b*h, required:()=>['baseSide','height'], create:(p)=>new THREE.Mesh(new THREE.CylinderGeometry(0.01, p.baseSide/1.2, p.height, 4), new THREE.MeshStandardMaterial({ color:0x9b59b6 })) },
        cone: { type:"3d", name:"مخروط", allowedLaws:["volume"], params:{ radius:1.0, height:1.5 }, getVolume:(r,h)=>(1/3)*Math.PI*r*r*h, required:()=>['radius','height'], create:(p)=>new THREE.Mesh(new THREE.ConeGeometry(p.radius, p.height, 48), new THREE.MeshStandardMaterial({ color:0xe67e22 })) },
        rectangle: { type:"2d", name:"مستطيل", allowedLaws:["area","perimeter"], params:{ length:1.5, width:1.0 }, getArea:(l,w)=>l*w, getPerimeter:(l,w)=>2*(l+w), required:()=>['length','width'], create:(p)=>new THREE.Mesh(new THREE.BoxGeometry(p.length, 0.05, p.width), new THREE.MeshStandardMaterial({ color:0x3a86ff })) },
        square: { type:"2d", name:"مربع", allowedLaws:["area","perimeter"], params:{ side:1.4 }, getArea:s=>s*s, getPerimeter:s=>4*s, required:()=>['side'], create:p=>new THREE.Mesh(new THREE.BoxGeometry(p.side, 0.05, p.side), new THREE.MeshStandardMaterial({ color:0x10b981 })) },
        triangle: { type:"2d", name:"مثلث", allowedLaws:["area"], params:{ base:1.4, height:1.2 }, getArea:(b,h)=>0.5*b*h, required:()=>['base','height'], create:p=>{ const s=new THREE.Shape(); s.moveTo(-p.base/2,-p.height/2); s.lineTo(0,p.height/2); s.lineTo(p.base/2,-p.height/2); s.closePath(); const m=new THREE.Mesh(new THREE.ShapeGeometry(s), new THREE.MeshStandardMaterial({ color:0xe67e22, side:THREE.DoubleSide })); m.rotation.x=-Math.PI/2; return m; } },
        trapezoid: { type:"2d", name:"شبه منحرف", allowedLaws:["area"], params:{ base1:1.6, base2:1.0, height:1.0 }, getArea:(b1,b2,h)=>0.5*(b1+b2)*h, required:()=>['base1','base2','height'], create:p=>{ const s=new THREE.Shape(); s.moveTo(-p.base1/2,-p.height/2); s.lineTo(-p.base2/2,p.height/2); s.lineTo(p.base2/2,p.height/2); s.lineTo(p.base1/2,-p.height/2); s.closePath(); const m=new THREE.Mesh(new THREE.ShapeGeometry(s), new THREE.MeshStandardMaterial({ color:0xf1c40f, side:THREE.DoubleSide })); m.rotation.x=-Math.PI/2; return m; } }
    };
    
    let currentShapeId = "triPrism";
    let currentLaw = "volume";
    let currentStudent = { name: "", solved: 0, wrongAnswers: [] };
    
    function isValidArabicName(name) {
        const trimmed = name.trim();
        if (trimmed.split(/\s+/).length < 3) return false;
        if (!/^[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\s]+$/.test(trimmed)) return false;
        if (/[0-9]/.test(trimmed)) return false;
        return true;
    }
    
    function updateLawSelector() {
        const shape = shapesDB[currentShapeId];
        const lawSelect = document.getElementById('lawSelect');
        lawSelect.innerHTML = '';
        shape.allowedLaws.forEach(law => {
            const option = document.createElement('option');
            option.value = law;
            if (law === 'volume') option.textContent = '📦 الحجم';
            else if (law === 'area') option.textContent = '📐 المساحة';
            else option.textContent = '📏 المحيط';
            lawSelect.appendChild(option);
        });
        if (!shape.allowedLaws.includes(currentLaw)) currentLaw = shape.allowedLaws[0];
        lawSelect.value = currentLaw;
    }
    
    function getCurrentParams() {
        const shape = shapesDB[currentShapeId];
        let params = {};
        shape.required().forEach(p => {
            const input = document.getElementById(`param_${p}`);
            params[p] = input ? parseFloat(input.value) || shape.params[p] : shape.params[p];
        });
        return params;
    }
    
    function getCorrectAnswer() {
        const shape = shapesDB[currentShapeId];
        const p = getCurrentParams();
        if (currentLaw === 'volume') {
            if (currentShapeId === 'triPrism') return shape.getVolume(p.baseEdge, p.prismHeight, p.triangleHeight);
            if (currentShapeId === 'rectPrism') return shape.getVolume(p.length, p.width, p.height);
            if (currentShapeId === 'cylinder') return shape.getVolume(p.radius, p.height);
            if (currentShapeId === 'triPyramid') return shape.getVolume(p.baseEdge, p.height, p.triangleHeight);
            if (currentShapeId === 'squarePyramid') return shape.getVolume(p.baseSide, p.height);
            if (currentShapeId === 'cone') return shape.getVolume(p.radius, p.height);
        } else if (currentLaw === 'area') {
            if (currentShapeId === 'rectangle') return shape.getArea(p.length, p.width);
            if (currentShapeId === 'square') return shape.getArea(p.side);
            if (currentShapeId === 'triangle') return shape.getArea(p.base, p.height);
            if (currentShapeId === 'trapezoid') return shape.getArea(p.base1, p.base2, p.height);
        } else if (currentLaw === 'perimeter') {
            if (currentShapeId === 'rectangle') return shape.getPerimeter(p.length, p.width);
            if (currentShapeId === 'square') return shape.getPerimeter(p.side);
        }
        return 0;
    }
    
    function updateShape() {
        if(currentMesh) scene.remove(currentMesh);
        const shape = shapesDB[currentShapeId];
        const mesh = shape.create(getCurrentParams());
        if(mesh) { mesh.castShadow = true; mesh.position.y = -0.2; currentMesh = mesh; scene.add(currentMesh); }
    }
    
    function rebuildInputs() {
        const shape = shapesDB[currentShapeId];
        const inputsArea = document.getElementById('inputsArea');
        inputsArea.innerHTML = '';
        const paramNames = { baseEdge: 'ضلع القاعدة', prismHeight: 'ارتفاع المنشور', triangleHeight: 'ارتفاع المثلث', length: 'الطول', width: 'العرض', height: 'الارتفاع', radius: 'نصف القطر', baseSide: 'ضلع القاعدة', side: 'الضلع', base: 'القاعدة', base1: 'القاعدة الكبرى', base2: 'القاعدة الصغرى' };
        shape.required().forEach(param => {
            const def = shape.params[param];
            const div = document.createElement('div');
            div.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:#1e2a3a;padding:3px 12px;border-radius:30px;';
            const label = document.createElement('label');
            label.innerText = (paramNames[param] || param) + ':';
            label.style.color = '#2ecc71';
            const input = document.createElement('input');
            input.type = 'number'; input.value = def; input.step = 'any';
            input.style.width = '65px'; input.style.background = '#0a0f1e'; input.style.color = '#2ecc71'; input.style.border = '1px solid #2ecc71'; input.style.borderRadius = '30px'; input.style.textAlign = 'center';
            input.id = `param_${param}`;
            input.addEventListener('input', () => updateShape());
            div.appendChild(label); div.appendChild(input);
            inputsArea.appendChild(div);
        });
        updateShape();
    }
    
    async function checkAnswer() {
        const studentVal = parseFloat(document.getElementById('studentAnswer').value);
        const correct = getCorrectAnswer();
        const feedback = document.getElementById('feedbackMsg');
        const resultArea = document.getElementById('resultArea');
        const lawName = currentLaw === 'volume' ? 'الحجم' : (currentLaw === 'area' ? 'المساحة' : 'المحيط');
        
        if(isNaN(studentVal)) {
            feedback.innerHTML = "❌ الرجاء كتابة الناتج أولاً";
            return;
        }
        
        if(Math.abs(studentVal - correct) < 0.01) {
            feedback.innerHTML = "✅ إجابة صحيحة! أحسنت ✅";
            resultArea.innerHTML = `🎉 صحيح! الناتج = ${correct.toFixed(2)}`;
            resultArea.className = "result-area result-correct";
            currentStudent.solved++;
            await sendToGoogleSheets(currentStudent.name, shapesDB[currentShapeId].name, lawName, studentVal, correct.toFixed(2), "صحيحة ✅");
        } else {
            feedback.innerHTML = `❌ خطأ! الإجابة الصحيحة هي ${correct.toFixed(2)} ❌`;
            resultArea.innerHTML = `❌ خطأ | الصحيح: ${correct.toFixed(2)} | إجابتك: ${studentVal}`;
            resultArea.className = "result-area result-wrong";
            currentStudent.wrongAnswers.push({
                shape: shapesDB[currentShapeId].name,
                law: lawName,
                correct: correct,
                studentAnswer: studentVal
            });
            await sendToGoogleSheets(currentStudent.name, shapesDB[currentShapeId].name, lawName, studentVal, correct.toFixed(2), "خاطئة ❌");
        }
        
        setTimeout(() => { resultArea.className = "result-area"; }, 2000);
        document.getElementById('studentAnswer').value = '';
    }
    
    async function fetchAllStudentsData() {
        try {
            const response = await fetch(GOOGLE_SHEETS_WEBHOOK_URL + '?t=' + Date.now());
            const data = await response.json();
            return data;
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
            return { rows: [] };
        }
    }
    
    function processStudentsData(data) {
        if (!data.rows || data.rows.length === 0) return [];
        
        const studentsMap = new Map();
        
        data.rows.forEach(row => {
            const studentName = row[0];
            const shape = row[3];
            const operation = row[4];
            const studentAnswer = row[5];
            const correctAnswer = row[6];
            const result = row[7];
            
            if (!studentName) return;
            
            if (!studentsMap.has(studentName)) {
                studentsMap.set(studentName, { name: studentName, solved: 0, wrongAnswers: [] });
            }
            
            const student = studentsMap.get(studentName);
            if (result && (result.includes("صحيحة") || result.includes("✅"))) {
                student.solved++;
            } else if (result && (result.includes("خاطئة") || result.includes("❌"))) {
                student.wrongAnswers.push({
                    shape: shape || "غير معروف",
                    law: operation || "غير معروف",
                    studentAnswer: studentAnswer || "?",
                    correct: correctAnswer || "?"
                });
            }
        });
        
        return Array.from(studentsMap.values());
    }
    
    function displayResults(students) {
        const containerDiv = document.getElementById('resultsList');
        
        if (students.length === 0) {
            containerDiv.innerHTML = '<div style="text-align:center; padding: 40px; color: #aaa;">📭 لا توجد نتائج بعد</div>';
            return;
        }
        
        containerDiv.innerHTML = students.map(s => {
            const wrongHtml = s.wrongAnswers.map(w => `
                <div class="error-item">
                    <div><span class="error-shape">📦 ${w.shape}</span> - ${w.law}</div>
                    <div class="values-compare">
                        <span>✏️ إجابة الطالب: <span class="student-val">${w.studentAnswer}</span></span>
                        <span>✅ الإجابة الصحيحة: <span class="correct-val">${w.correct}</span></span>
                    </div>
                </div>
            `).join('');
            
            const totalAttempts = s.solved + s.wrongAnswers.length;
            const successRate = totalAttempts > 0 ? ((s.solved / totalAttempts) * 100).toFixed(0) : 0;
            
            return `
                <div class="student-card">
                    <div class="student-name">
                        👨‍🎓 ${s.name} 
                        <span style="font-size: 0.7rem; background: #2c3e50; padding: 2px 8px; border-radius: 20px; color: #2ecc71;">
                            نسبة النجاح ${successRate}%
                        </span>
                    </div>
                    <div class="stats">
                        <span class="stat-badge correct">✅ صحيح: ${s.solved}</span>
                        <span class="stat-badge wrong">❌ خطأ: ${s.wrongAnswers.length}</span>
                        <span class="stat-badge total">📊 المجموع: ${totalAttempts}</span>
                    </div>
                    ${s.wrongAnswers.length > 0 ? 
                        `<details open>
                            <summary>📋 تفاصيل الأخطاء (${s.wrongAnswers.length})</summary>
                            <div class="errors-details">${wrongHtml}</div>
                        </details>` : 
                        '<div class="no-errors">✨ ممتاز! لا توجد أخطاء ✨</div>'
                    }
                </div>
            `;
        }).join('');
    }
    
    // ========== إدارة الشاشات ==========
    const loginScreen = document.getElementById('loginScreen');
    const teacherScreen = document.getElementById('teacherScreen');
    const resultsScreen = document.getElementById('resultsScreen');
    const gameContainer = document.getElementById('gameContainer');
    const nameInput = document.getElementById('studentNameInput');
    const nameError = document.getElementById('nameError');
    
    document.getElementById('startGameBtn').onclick = () => {
        const name = nameInput.value.trim();
        if (!isValidArabicName(name)) { nameError.style.display = 'block'; return; }
        nameError.style.display = 'none';
        currentStudent = { name: name, solved: 0, wrongAnswers: [] };
        document.getElementById('studentBadge').innerText = `👤 ${name}`;
        loginScreen.classList.add('hide');
        gameContainer.classList.remove('hide');
        updateLawSelector();
        rebuildInputs();
    };
    
    document.getElementById('teacherLoginBtn').onclick = () => { 
        loginScreen.classList.add('hide'); 
        teacherScreen.classList.remove('hide'); 
    };
    
    document.getElementById('backToStudentBtn').onclick = () => { 
        teacherScreen.classList.add('hide'); 
        loginScreen.classList.remove('hide'); 
    };
    
    document.getElementById('teacherSubmitBtn').onclick = async () => {
        const pass = document.getElementById('teacherPassInput').value;
        if (pass === "2925") {
            teacherScreen.classList.add('hide');
            document.getElementById('welcomeMessage').innerHTML = '🌸 أهلاً المعلمة / ابتسام العطوي 🌸<br>📊 جاري تحميل النتائج...';
            resultsScreen.classList.remove('hide');
            
            const data = await fetchAllStudentsData();
            const students = processStudentsData(data);
            displayResults(students);
        } else {
            alert("⚠️ الرقم السري غير صحيح");
        }
    };
    
    document.getElementById('closeResultsBtn').onclick = () => { 
        resultsScreen.classList.add('hide'); 
        loginScreen.classList.remove('hide'); 
    };
    
    document.getElementById('shapeSelect').addEventListener('change', (e) => { 
        currentShapeId = e.target.value; 
        updateLawSelector(); 
        rebuildInputs(); 
    });
    
    document.getElementById('lawSelect').addEventListener('change', (e) => { 
        currentLaw = e.target.value; 
        rebuildInputs(); 
    });
    
    document.getElementById('checkAnswerBtn').addEventListener('click', checkAnswer);
    
    // خلفية نجوم
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(800 * 3);
    for(let i = 0; i < 800; i++) {
        starPos[i*3] = (Math.random() - 0.5) * 200;
        starPos[i*3+1] = (Math.random() - 0.5) * 100;
        starPos[i*3+2] = (Math.random() - 0.5) * 100 - 50;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
    scene.add(stars);
    
    function animate() { 
        requestAnimationFrame(animate); 
        controls.update(); 
        renderer.render(scene, camera); 
        stars.rotation.y += 0.0005;
    }
    animate();
    
    window.addEventListener('resize', () => { 
        camera.aspect = window.innerWidth / window.innerHeight; 
        camera.updateProjectionMatrix(); 
        renderer.setSize(window.innerWidth, window.innerHeight); 
    });
</script>
</body>
